[package]
name = "web-remarq-swc-plugin"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
swc_core = { version = "=47.0.0", features = [
    "ecma_plugin_transform",
    "ecma_visit",
    "ecma_ast",
    "ecma_utils",
    "common",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
lto = true
opt-level = "s"
